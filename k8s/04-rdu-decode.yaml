# RDU decode worker (Dockerfile.rdu). Docker precedent: launch/rdu_decode.sh /
# docker/rdu-decode-entrypoint.sh, run via docker-run-wrapper with
# --net=host --device /dev/rdu --device /dev/rdu_mem_map --device /dev/infiniband
# --ulimit memlock=-1 --cap-add IPC_LOCK.
#
# k8s translation (plan §4.6-§4.8, all non-privileged):
#   - sambanova.ai/rdu-tile (device plugin, see 00-rdu-device-plugin.yaml) replaces
#     --device /dev/rdu --device /dev/rdu_mem_map, PLUS gates scheduling on snd/rdu_driver.ko health.
#   - hostPath /dev/infiniband replaces --device /dev/infiniband (device plugin's own Allocate()
#     does not wire RDMA devices -- confirmed gap, plan §4.8).
#   - hostNetwork: true replaces --net=host.
#   - securityContext.capabilities.add: ["IPC_LOCK"] replaces --ulimit memlock=-1.
#   - BAR2_INSTALL/BAR2_RUNTIME_LIBS/BAR2_PRELOAD (still NFS paths, self-build deferred) replace
#     docker-run-wrapper's automatic /import mount, via an explicit hostPath here.
#
# The bnxt_re RDMA userspace provider fix (Phase 4 root cause -- rhel810-dev's base image lacked
# SambaNova's replacement for the stock, broken rdma-core bnxt_re provider) is baked into the
# RDU_IMAGE itself (Dockerfile.rdu + vendor/bnxt_re/) -- no additional k8s-side accommodation
# needed for it here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rdu-hdi-rdu-decode
  labels:
    app: rdu-hdi-rdu-decode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rdu-hdi-rdu-decode
  template:
    metadata:
      labels:
        app: rdu-hdi-rdu-decode
    spec:
      # Placeholder label -- adjust to this cluster's actual RDU node labeling convention
      # (plan §5 notes fast-coe uses an snRduArch=sn40-16-style convention).
      nodeSelector:
        sambanova.ai/rdu: "true"
      hostNetwork: true  # RoCE IP visibility for UCX/NIXL -- same as --net=host on bare Docker
      dnsPolicy: ClusterFirstWithHostNet  # required so Service DNS (CONTROL_PLANE_IP) still resolves under hostNetwork
      containers:
        - name: rdu-decode
          image: sc-artifacts2.sambanovasystems.com/sw-docker-scratch/rdu-hdi-rdu-decode:v1.2.1-rdu-hdi.1
          envFrom:
            - configMapRef: {name: rdu-hdi-config}
          env:
            - name: GPU_ROCE_IP
              # Bare metal hardcodes config/cluster.env's GPU_ROCE_IP; in k8s, the GPU-prefill pod's
              # actual host IP is only known at runtime. A Downward-API fieldRef can't reach across
              # pods, so this needs either: (a) the GPU-prefill Service's ClusterIP if NIXL's
              # producer-host field tolerates a Service IP rather than a raw host IP (untested), or
              # (b) a small init step/sidecar that resolves the GPU-prefill pod's status.hostIP via
              # the k8s API and writes it here before the main container starts. Left as an explicit
              # placeholder rather than a guessed value -- this is exactly the kind of
              # network-identity plumbing the plan (§4.10) flags as needing re-deriving per cluster,
              # not hardcoding. Bare-metal value shown for reference only:
              value: "REPLACE_ME_GPU_PREFILL_HOST_IP"  # bare metal: config/cluster.env GPU_ROCE_IP=10.17.176.33
            - name: RDU_CACHE
              value: /cache
          resources:
            requests: {cpu: "4", memory: 16Gi}
            limits:
              cpu: "8"
              memory: 32Gi
              sambanova.ai/rdu-tile: "16"  # tile count -- matches this model's TP16 PEF topology (config/model.env PEF name), adjust per model
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]  # k8s-native equivalent of --ulimit memlock=-1 (plan §4.8)
          volumeMounts:
            - {name: dev-infiniband, mountPath: /dev/infiniband}
            - {name: import-nfs, mountPath: /import}
            - {name: cache, mountPath: /cache}
      volumes:
        - name: dev-infiniband
          hostPath: {path: /dev/infiniband}
        - name: import-nfs
          hostPath: {path: /import}
        - name: cache
          emptyDir: {}
