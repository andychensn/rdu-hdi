# LEGACY -- kept for reference/rollback only. As of the fast-coe -> vllm-rdu
# migration, config/minimax_m2.yaml (vllm-rdu's flat RduConfig schema) is
# the live config; this file is no longer read by anything.
#
# RDU configuration for MiniMax-M2.7 FP8 on SN40L.
# Schema: fast-coe's rdu_manifest.model_registry.Expert.from_config (server/rdu_manifest).
# Copied verbatim (structure + values) from hdi's proven
# fast-coe/server/vllm-ext/configs/minimax_m2.yaml (commit c3f335377) — same PEF,
# same checkpoint, same dynamic-dims config. Unlike the old (retired) flat
# RduConfig schema, pef_path/checkpoint_path are embedded here by name, not
# injected at runtime by rdu_decode.sh.

pefs:
  MINI_PEF_FP8: "/import/ml-sc-scratch4/jayr/minimax_m2__full_layers_tp16_ssss_cg_ss_max_ss_tg_parallel_sdk_fp8_per_tensor/minimax-m2__full_layers_TP16_ssSS_CG_SS_MAX_SS_TG_parallel_sdk_fp8_per_tensor_CoE_ckpt_sharing_BS2_SSSS_CG_max196608_SS_MAX_max196608_SS_TG_max196608/minimax-m2__full_layers_TP16_ssSS_CG_SS_MAX_SS_TG_parallel_sdk_fp8_per_tensor_CoE_ckpt_sharing_BS2_SSSS_CG_max196608_SS_MAX_max196608_SS_TG_max196608.pef"

checkpoints:
  MINI_CKPT_FP8: "/scratch/MiniMax-M2.7-FP8-RDU-packed"

experts:
  MiniMax-M2.7:
    -
      batch_size: 2
      pef: MINI_PEF_FP8
      checkpoint: MINI_CKPT_FP8
      num_tokens_at_a_time: 20
      dynamic_dims:
        enabled: true
        prefill_seq:
          name: SS_CG
          min: 4096
          max: 196608
          step: 4096
          set_at: runtime
        decode_seq:
          name: SS_TG
          min: 4096
          max: 196608
          step: 4096
          set_at: runtime
        kv_seq:
          name: SS_MAX
          min: 4096
          max: 196608
          default: 196608
          step: 4096
          set_at: load
